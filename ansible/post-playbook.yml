---
- name: Post provision rocky
  hosts: rocky
  become: yes

  tasks:
    - name: add deployer public key
      authorized_key:
        user: deployer
        state: present
        key: "{{ lookup('file', '~/.ssh/deployer.pub') }}"

    - name: Create sudo users for deployer
      copy:
        content: "deployer ALL=(ALL) NOPASSWD: ALL\n"
        dest: /etc/sudoers.d/deployer
        mode: '0440'

    - name: hostname
      hostname:
        name: "{{ hostname }}"

    - name: Set static IP
      shell: |
        nmcli connection modify ens34 ipv4.method manual ipv4.address "{{ static_ip }}/24" ipv4.gateway "10.0.5.2" ipv4.dns "192.168.4.5"
        nmcli connection up ens34
